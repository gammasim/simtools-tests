---
name: CI-test-resources

on:
  workflow_dispatch:
  pull_request:

permissions: {}

jobs:

  test-resources:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash --noprofile --norc -e -o pipefail {0}

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install simtools
        run: |
          python -m pip install \
            "git+https://github.com/gammasim/simtools.git@refactor-tests-resources"

      - name: Validate test resources for all versions
        run: |
          if [[ ! -d simtools-tests ]]; then
            echo "Required directory simtools-tests/ does not exist." >&2
            exit 1
          fi

          shopt -s nullglob
          version_directories=(simtools-tests/v*/)

          if (( ${#version_directories[@]} == 0 )); then
            echo "No version directories found in simtools-tests/; skipping validation."
            exit 0
          fi

          for version_directory in "${version_directories[@]}"; do
            version="${version_directory#simtools-tests/}"
            version="${version%/}"
            echo "Validating test resources for ${version}"
            simtools-generate-test-resources \
              --test_directory . \
              --simtools_version "${version}" \
              --overwrite_collection_files \
              --test_static_files
          done
