---
name: CI-test-resources

on:
  workflow_dispatch:
  pull_request:

permissions: {}

jobs:

  test-resources:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -leo pipefail {0}

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install simtools
        run: |
          python -m pip install \
            "git+https://github.com/gammasim/simtools.git@refactor-tests-resources"

      - name: Validate test resources for all versions
        run: |
          versions=()
          for version_directory in simtools-tests/v*/; do
            [[ -d "${version_directory}" ]] || continue
            versions+=("${version_directory#simtools-tests/}")
          done

          if (( ${#versions[@]} == 0 )); then
            echo "No version directories found in simtools-tests/" >&2
            exit 1
          fi

          for version in "${versions[@]}"; do
            version="${version%/}"
            echo "Validating test resources for ${version}"
            simtools-generate-test-resources \
              --test_directory . \
              --simtools_version "${version}" \
              --overwrite_collection_files \
              --test_static_files
          done
