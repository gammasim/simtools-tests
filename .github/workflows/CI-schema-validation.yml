---
name: CI-schema-validation

on:
  workflow_dispatch:
  pull_request:

permissions: {}

jobs:

  schema-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -leo pipefail {0}

    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Installation
        run: |
          pip install -e .

      - name: Integration test config file validation
        run: |
          while IFS= read -r file; do
            echo "Testing config file $file"
            simtools-validate-file-using-schema \
            --file_name "$file" \
            --schema application_workflow.metaschema.yml \
            --data_type "schema" \
            --log_level DEBUG
          done < <(
            find simtools-tests \
              -path 'simtools-tests/v0.32.0' -prune -o \
              -path '*/integration_tests/config_files/*.config.yml' -type f -print
          )
