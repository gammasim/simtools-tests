---
applications:
- application: simtools-simulate-prod
  configuration:
    array_layout_name:
      by_version:
        "<7.0.0": alpha
        ">=7.0.0": CTAO-North-Alpha
    azimuth_angle: 0
    core_scatter: 20 2000 m
    corsika_seeds: [534, 220, 1104, 382]
    corsika_he_interaction: epos
    corsika_le_interaction: urqmd
    energy_range: 30 GeV 10 TeV
    label: test
    log_level: DEBUG
    model_version: 6.0.2
    showers_per_run: 5
    output_path: __TEST_DIRECTORY__/simtools-tests/__SIMTOOLS_VERSION__/integration_tests/tmp/simulate_prod_gamma_20deg_north_alpha
    grid_output_path: __TEST_DIRECTORY__/simtools-tests/__SIMTOOLS_VERSION__/integration_tests/tmp/simulate_prod_gamma_20deg_north_alpha
    primary: gamma
    run_number: 10
    save_reduced_event_lists: true
    sim_telarray_seed: [1745, 290]
    simulation_software: corsika_sim_telarray
    site: North
    view_cone: 0 deg 10 deg
    zenith_angle: 20
collection:
- output_path: __TEST_DIRECTORY__/simtools-tests/__SIMTOOLS_VERSION__/integration_tests/generated
  files:
  - gamma_diffuse_run000010_za20deg_azm000deg_North_alpha_6.0.2_test.simtel.zst
  - gamma_diffuse_run000010_za20deg_azm000deg_North_alpha_6.0.2_test.hdata.zst
  - gamma_diffuse_run000010_za20deg_azm000deg_North_alpha_6.0.2_test.reduced_event_data.hdf5
- output_path: __TEST_DIRECTORY__/simtools-tests/__SIMTOOLS_VERSION__/integration_tests/log_files
  files:
  - gamma_diffuse_run000010_za20deg_azm000deg_North_alpha_6.0.2_test.simtel.log.gz
schema_name: application_workflow.metaschema
schema_url: https://github.com/gammasim/simtools/blob/main/src/simtools/schemas/application_workflow.metaschema.yml
schema_version: 0.4.0
