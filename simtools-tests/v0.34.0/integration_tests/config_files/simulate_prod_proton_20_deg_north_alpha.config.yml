---
applications:
- application: simtools-simulate-prod
  configuration:
    array_layout_name:
    - CTAO-North-Alpha
    azimuth_angle: South
    core_scatter: 5 500 m  # test file generation - too small for real production
    corsika_seeds: [534, 220, 1104, 382]
    corsika_he_interaction: epos
    corsika_le_interaction: urqmd
    energy_range: 200 GeV 500 GeV  # test file generation - too narrow for real production
    label: test
    log_level: INFO
    model_version: 7.0.0
    showers_per_run: 5
    output_path: __INTEGRATION_TESTS_DIRECTORY__/tmp/simulate_prod_proton_20_deg_north_alpha
    grid_output_path: __INTEGRATION_TESTS_DIRECTORY__/tmp/simulate_prod_proton_20_deg_north_alpha
    primary: proton
    run_number: 1
    save_reduced_event_lists: true
    sim_telarray_seed: [1745, 290]
    simulation_software: corsika_sim_telarray
    site: North
    view_cone: 0 deg 5 deg
    zenith_angle: 20
collection:
- output_path: __INTEGRATION_TESTS_DIRECTORY__/generated
  files:
  - proton_run000001_za20deg_azm180deg_North_CTAO-North-Alpha_7.0.0_test.simtel.zst
  - proton_run000001_za20deg_azm180deg_North_CTAO-North-Alpha_7.0.0_test.reduced_event_data.hdf5
  - proton_run000001_za20deg_azm180deg_North_CTAO-North-Alpha_7.0.0_test.simtel.log.gz
- output_path: __INTEGRATION_TESTS_DIRECTORY__/log_files
  files:
  - proton_run000001_za20deg_azm180deg_North_CTAO-North-Alpha_7.0.0_test.simtel.log.gz
schema_name: application_workflow.metaschema
schema_url: https://github.com/gammasim/simtools/blob/main/src/simtools/schemas/application_workflow.metaschema.yml
schema_version: 0.4.0
